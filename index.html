<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>શાળા વિધાર્થી રેકોર્ડ સિસ્ટમ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans Gujarati', 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
  }

  /* ---------- LOGIN SCREEN ---------- */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .login-box {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    padding: 36px 32px;
    width: 340px;
    max-width: 100%;
  }
  .login-box h1 {
    font-size: 20px;
    text-align: center;
    margin-bottom: 4px;
    color: #1a1a2e;
  }
  .login-box p.subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 22px;
  }
  .role-toggle {
    display: flex;
    background: #f0f2f5;
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 20px;
  }
  .role-toggle button {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #666;
  }
  .role-toggle button.active {
    background: #2e4a7a;
    color: #fff;
  }
  .login-box label {
    display: block;
    font-size: 13px;
    color: #555;
    margin: 12px 0 5px;
  }
  .login-box input, .login-box select {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid #d8dbe2;
    border-radius: 6px;
    font-size: 16px;
  }
  .login-box button.submit {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    background: #2e4a7a;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .login-box button.submit:hover { background: #25395e; }
  .login-error {
    color: #c0392b;
    font-size: 12.5px;
    margin-top: 10px;
    text-align: center;
  }
  .login-hint {
    font-size: 11.5px;
    color: #aaa;
    text-align: center;
    margin-top: 16px;
    line-height: 1.5;
  }

  /* ---------- APP SHELL ---------- */
  #app-screen { display: none; min-height: 100vh; }
  .topbar {
    background: #1a2744;
    color: #fff;
    padding: 12px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .topbar .brand { font-size: 16px; font-weight: 700; }
  .topbar .brand span { color: #8aa8e0; font-weight: 400; font-size: 12px; margin-left: 8px; }
  .topbar .user-area { display: flex; align-items: center; gap: 14px; font-size: 13px; flex-wrap: wrap; }
  .topbar button.logout {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12.5px;
  }
  .topbar button.logout:hover { background: rgba(255,255,255,0.22); }
  .content { padding: 22px; max-width: 1300px; margin: 0 auto; }

  /* ---------- ADMIN DASHBOARD ---------- */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 22px;
  }
  .summary-card {
    background: #fff;
    border-radius: 8px;
    padding: 16px 18px;
    border: 1px solid #e6e8ee;
  }
  .summary-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .summary-card .value { font-size: 22px; font-weight: 700; color: #1a2744; }

  .panel {
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e6e8ee;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid #eee;
    font-weight: 700;
    font-size: 14.5px;
    color: #1a2744;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-body { padding: 4px 0; }

  table.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  table.data-table th, table.data-table td {
    border: 1px solid #e6e8ee;
    padding: 6px 7px;
    text-align: center;
    white-space: nowrap;
  }
  table.data-table th { background: #f6f7fb; font-weight: 700; color: #333; }
  table.data-table td.row-name { text-align: left; font-weight: 600; }
  table.data-table tr.shaded td { background: #fafafa; }
  table.data-table tr.subtotal-row td { background: #eaf0fb; font-weight: 700; color: #1a2744; }
  table.data-table tr.grand-total-row td { background: #2e4a7a; color: #fff; font-weight: 800; }
  .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge.locked { background: #fde2e2; color: #b33636; }
  .badge.open { background: #e1f3e8; color: #237a47; }

  .action-btn {
    border: none;
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    margin: 0 2px;
  }
  .action-btn.edit { background: #e6edfb; color: #2e4a7a; }
  .action-btn.edit:disabled { background: #f0f0f0; color: #bbb; cursor: not-allowed; }
  .action-btn.lock { background: #fdeee0; color: #a65b1e; }
  .action-btn.unlock { background: #e1f3e8; color: #237a47; }

  /* ---------- TEACHER FORM ---------- */
  .entry-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 10px;
  }
  .entry-field {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border: 1px solid #e0e3ea;
    border-radius: 6px;
    padding: 8px 10px;
    background: #fafbfc;
  }
  .entry-field label {
    font-size: 12.5px;
    color: #444;
    flex: 1;
  }
  .entry-field input {
    width: 90px;
    padding: 7px 8px;
    border: 1px solid #d8dbe2;
    border-radius: 5px;
    text-align: center;
    font-size: 13.5px;
  }
  .entry-field input:focus {
    outline: none;
    border-color: #2e4a7a;
    box-shadow: 0 0 0 2px rgba(46,74,122,0.15);
  }
  .entry-field input:disabled {
    background: #f3f3f3;
    color: #999;
    border-color: #e6e6e6;
  }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .form-actions button {
    padding: 9px 18px;
    border: none;
    border-radius: 6px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: #2e4a7a; color: #fff; }
  .btn-primary:hover { background: #25395e; }
  .btn-primary:disabled { background: #aab4c8; cursor: not-allowed; }
  .btn-secondary { background: #eef0f4; color: #444; }

  .locked-note {
    margin-top: 12px;
    font-size: 12.5px;
    color: #a65b1e;
    background: #fdeee0;
    padding: 8px 12px;
    border-radius: 6px;
    display: none;
  }

  .empty-state {
    padding: 30px;
    text-align: center;
    color: #999;
    font-size: 13px;
  }

  .col-section-label {
    font-size: 11px;
    color: #888;
    margin: 18px 0 8px;
    font-weight: 700;
  }

  /* ---------- RESPONSIVE: TABLET (≤1024px) ---------- */
  @media (max-width: 1024px) {
    .content { padding: 18px; }
    .summary-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .entry-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
  }

  /* ---------- RESPONSIVE: TABLET / SMALL LAPTOP (≤768px) ---------- */
  @media (max-width: 768px) {
    .topbar {
      padding: 10px 14px;
    }
    .topbar .brand {
      font-size: 14.5px;
    }
    .topbar .brand span {
      display: block;
      margin-left: 0;
      margin-top: 2px;
    }
    .topbar .user-area {
      font-size: 12px;
      gap: 10px;
    }
    .content { padding: 14px; }

    .summary-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .summary-card { padding: 12px 14px; }
    .summary-card .value { font-size: 19px; }

    .panel-header {
      padding: 12px 14px;
      font-size: 13.5px;
    }

    table.data-table { font-size: 11.5px; }
    table.data-table th, table.data-table td {
      padding: 5px 6px;
    }

    .entry-grid {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .entry-field {
      padding: 10px 12px;
    }
    .entry-field label {
      font-size: 13px;
    }
    .entry-field input {
      width: 80px;
      font-size: 15px;
    }

    .form-actions {
      flex-direction: column;
    }
    .form-actions button {
      width: 100%;
    }
  }

  /* ---------- RESPONSIVE: MOBILE (≤480px) ---------- */
  @media (max-width: 480px) {
    #login-screen { padding: 12px; }
    .login-box {
      padding: 26px 20px;
      width: 100%;
    }
    .login-box h1 { font-size: 17px; }

    .topbar {
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }
    .topbar .user-area {
      width: 100%;
      justify-content: space-between;
    }

    .content { padding: 10px; }

    .summary-grid {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .summary-card {
      padding: 10px 12px;
    }
    .summary-card .label { font-size: 11px; }
    .summary-card .value { font-size: 17px; }

    .panel { border-radius: 6px; }
    .panel-header {
      padding: 10px 12px;
      font-size: 13px;
    }

    table.data-table { font-size: 11px; }
    table.data-table th, table.data-table td {
      padding: 5px;
    }

    .entry-field {
      flex-direction: row;
      flex-wrap: wrap;
    }
    .entry-field label {
      width: 100%;
      margin-bottom: 4px;
    }
    .entry-field input {
      width: 100%;
    }

    .action-btn {
      padding: 6px 9px;
      font-size: 11px;
    }
  }
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen">
  <div class="login-box">
    <h1>શાળા વિધાર્થી રેકોર્ડ સિસ્ટમ</h1>
    <p class="subtitle">Login to continue</p>

    <div class="role-toggle">
      <button id="tab-admin" class="active" onclick="switchRole('admin')">Super Admin</button>
      <button id="tab-teacher" onclick="switchRole('teacher')">Teacher</button>
    </div>

    <div id="admin-fields">
      <label>Username</label>
      <input type="text" id="admin-username" placeholder="admin" />
      <label>Password</label>
      <input type="password" id="admin-password" placeholder="••••••••" />
    </div>

    <div id="teacher-fields" style="display:none;">
      <label>Select your standard (ધોરણ)</label>
      <select id="teacher-standard">
        <option value="">-- Select --</option>
      </select>
      <label>Teacher name</label>
      <input type="text" id="teacher-name" placeholder="Your name" />
      <label>Password</label>
      <input type="password" id="teacher-password" placeholder="••••••••" />
    </div>

    <button class="submit" onclick="attemptLogin()">Login</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-hint">Demo credentials — Admin: admin / admin123<br>Teacher: any name, password teacher123</div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app-screen">
  <div class="topbar">
    <div class="brand">શાળા વિધાર્થી રેકોર્ડ સિસ્ટમ <span id="role-tag"></span></div>
    <div class="user-area">
      <span id="user-display"></span>
      <button class="logout" onclick="logout()">લોગ આઉટ</button>
    </div>
  </div>
  <div class="content" id="content-area"></div>
</div>

<script>
/* ---------------- DATA MODEL ---------------- */
const STANDARDS = [
  "બાલવાટિકા", "પહેલું", "બીજું", "ત્રીજું", "ચોથું", "પાંયમું",
  "છઠ્ઠું", "સાતમું", "આઠમું"
];

const FIELD_DEFS = [
  { key: "sc_b", label: "અનુ.જાતિ કુમાર" },
  { key: "sc_g", label: "અનુ.જાતિ કન્યા" },
  { key: "st_b", label: "અનુ.જ.જાતિ કુમાર" },
  { key: "st_g", label: "અનુ.જ.જાતિ કન્યા" },
  { key: "obc_b", label: "બક્ષીપંચ કુમાર" },
  { key: "obc_g", label: "બક્ષીપંચ કન્યા" },
  { key: "other_b", label: "અન્ય કુમાર" },
  { key: "other_g", label: "અન્ય કન્યા" },
  { key: "att_b", label: "સરેરાશ હાજરી કુમાર" },
  { key: "att_g", label: "સરેરાશ હાજરી કન્યા" },
  { key: "midday", label: "મધ્યાહ્ન ભોજનના લાભાર્થી" },
  { key: "bond", label: "વિધાલક્ષ્મી બોન્ડ ધારક કન્યાઓ" },
  { key: "minority", label: "તે પૈકી લઘુમતિ બાળકો" },
  { key: "aadhar", label: "આધાર કાર્ડ બાળકો" }
];

/* in-memory store: { standard: { fields:{}, teacherName, locked, updatedAt } } */
let records = {};

let currentUser = null; /* { role: 'admin'|'teacher', name, standard } */
let pendingRole = 'admin';

/* populate teacher standard dropdown */
const teacherStdSelect = document.getElementById('teacher-standard');
STANDARDS.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s; opt.textContent = s;
  teacherStdSelect.appendChild(opt);
});

function switchRole(role) {
  pendingRole = role;
  document.getElementById('tab-admin').classList.toggle('active', role === 'admin');
  document.getElementById('tab-teacher').classList.toggle('active', role === 'teacher');
  document.getElementById('admin-fields').style.display = role === 'admin' ? 'block' : 'none';
  document.getElementById('teacher-fields').style.display = role === 'teacher' ? 'block' : 'none';
  document.getElementById('login-error').textContent = '';
}

function attemptLogin() {
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  if (pendingRole === 'admin') {
    const u = document.getElementById('admin-username').value.trim();
    const p = document.getElementById('admin-password').value;
    if (u === 'admin' && p === 'admin123') {
      currentUser = { role: 'admin' };
      enterApp();
    } else {
      errEl.textContent = 'Username અથવા password ખોટું છે.';
    }
  } else {
    const std = document.getElementById('teacher-standard').value;
    const name = document.getElementById('teacher-name').value.trim();
    const p = document.getElementById('teacher-password').value;
    if (!std) { errEl.textContent = 'ધોરણ પસંદ કરો.'; return; }
    if (!name) { errEl.textContent = 'નામ લખો.'; return; }
    if (p !== 'teacher123') { errEl.textContent = 'Password ખોટું છે.'; return; }
    currentUser = { role: 'teacher', name, standard: std };
    enterApp();
  }
}

function logout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('admin-username').value = '';
  document.getElementById('admin-password').value = '';
  document.getElementById('teacher-name').value = '';
  document.getElementById('teacher-password').value = '';
}

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('role-tag').textContent = currentUser.role === 'admin' ? '— Super Admin' : '— Teacher Panel';
  document.getElementById('user-display').textContent = currentUser.role === 'admin'
    ? 'Admin' : (currentUser.name + ' (' + currentUser.standard + ')');
  render();
}

/* ---------------- RENDER ROUTER ---------------- */
function render() {
  if (currentUser.role === 'admin') renderAdmin();
  else renderTeacher();
}

/* ---------------- ADMIN VIEW HELPERS ---------------- */
function calcTotals(fields) {
  const totalB = (parseInt(fields.sc_b)||0) + (parseInt(fields.st_b)||0) + (parseInt(fields.obc_b)||0) + (parseInt(fields.other_b)||0);
  const totalG = (parseInt(fields.sc_g)||0) + (parseInt(fields.st_g)||0) + (parseInt(fields.obc_g)||0) + (parseInt(fields.other_g)||0);
  const totalAll = totalB + totalG;
  const attTotal = (parseInt(fields.att_b)||0) + (parseInt(fields.att_g)||0);
  return { totalB, totalG, totalAll, attTotal };
}

function emptyFieldSet() {
  const f = {};
  FIELD_DEFS.forEach(fd => f[fd.key] = 0);
  return f;
}

function sumStandards(stdList) {
  const sum = emptyFieldSet();
  stdList.forEach(std => {
    const r = records[std];
    if (r) {
      FIELD_DEFS.forEach(fd => sum[fd.key] += (parseInt(r.fields[fd.key]) || 0));
    }
  });
  return sum;
}

function dataRowCells(fields) {
  const t = calcTotals(fields);
  let html = '';
  ['sc_b','sc_g','st_b','st_g','obc_b','obc_g','other_b','other_g'].forEach(k => {
    html += '<td>' + (fields[k] || 0) + '</td>';
  });
  html += '<td>' + t.totalB + '</td><td>' + t.totalG + '</td><td>' + t.totalAll + '</td>';
  html += '<td>' + (fields.att_b || 0) + '</td><td>' + (fields.att_g || 0) + '</td><td>' + t.attTotal + '</td>';
  html += '<td>' + (fields.midday || 0) + '</td><td>' + (fields.bond || 0) + '</td><td>' + (fields.minority || 0) + '</td><td>' + (fields.aadhar || 0) + '</td>';
  return html;
}

function tableHeadHtml() {
  return '<thead>' +
    '<tr>' +
      '<th rowspan="2">ધોરણ</th>' +
      '<th colspan="2">અનુ.જાતિ</th>' +
      '<th colspan="2">અનુ.જ.જાતિ</th>' +
      '<th colspan="2">બક્ષીપંચ</th>' +
      '<th colspan="2">અન્ય</th>' +
      '<th colspan="3">કુલ</th>' +
      '<th colspan="3">સરેરાશ હાજરી</th>' +
      '<th rowspan="2">મધ્યાહ્ન ભોજનના<br>લાભાર્થી</th>' +
      '<th rowspan="2">વિધાલક્ષ્મી બોન્ડ<br>ધારક કન્યાઓ</th>' +
      '<th rowspan="2">તે પૈકી<br>લઘુમતિ બાળકો</th>' +
      '<th rowspan="2">આધાર કાર્ડ<br>બાળકો</th>' +
      '<th rowspan="2">સ્થિતિ</th>' +
      '<th rowspan="2">ક્રિયા</th>' +
    '</tr>' +
    '<tr>' +
      '<th>કુમાર</th><th>કન્યા</th>' +
      '<th>કુમાર</th><th>કન્યા</th>' +
      '<th>કુમાર</th><th>કન્યા</th>' +
      '<th>કુમાર</th><th>કન્યા</th>' +
      '<th>કુમાર</th><th>કન્યા</th><th>કુલ</th>' +
      '<th>કુમાર</th><th>કન્યા</th><th>કુલ</th>' +
    '</tr>' +
  '</thead>';
}

/* ---------------- ADMIN VIEW ---------------- */
function renderAdmin() {
  const area = document.getElementById('content-area');
  const filledCount = Object.keys(records).length;
  const lockedCount = Object.values(records).filter(r => r.locked).length;
  let totalAttendance = 0;
  Object.values(records).forEach(r => {
    totalAttendance += (parseInt(r.fields.att_b)||0) + (parseInt(r.fields.att_g)||0);
  });

  let html = '';
  html += '<div class="summary-grid">';
  html += summaryCard('કુલ ધોરણ', STANDARDS.length);
  html += summaryCard('રેકોર્ડ ભરાયેલ', filledCount + ' / ' + STANDARDS.length);
  html += summaryCard('લોક થયેલ', lockedCount);
  html += summaryCard('કુલ સરેરાશ હાજરી', totalAttendance);
  html += '</div>';

  html += '<div class="panel">';
  html += '<div class="panel-header">ધોરણવાર રેકોર્ડ</div>';
  html += '<div class="panel-body"><div class="scroll-x"><table class="data-table">';
  html += tableHeadHtml();
  html += '<tbody>';

  /* rows: index 0-5 = બાલવાટિકા + ૧ થી ૫, subtotal, then 6-8 = ૬ થી ૮, subtotal, then grand total */
  STANDARDS.forEach((std, i) => {
    const r = records[std];
    const shaded = i % 2 === 1 ? ' class="shaded"' : '';
    html += '<tr' + shaded + '>';
    html += '<td class="row-name">' + std + '</td>';
    html += '<td>' + (r ? escapeHtml(r.teacherName) : '<span style="color:#bbb">—</span>') + '</td>';
    html += dataRowCells(r ? r.fields : emptyFieldSet());
    if (r) {
      html += '<td>' + (r.locked ? '<span class="badge locked">Locked</span>' : '<span class="badge open">Open</span>') + '</td>';
      html += '<td>' + (r.locked
        ? '<span style="color:#bbb; font-size:11.5px;">કાયમ માટે લોક</span>'
        : '<span style="color:#bbb; font-size:11.5px;">શિક્ષક ભરી રહ્યા છે</span>') + '</td>';
    } else {
      html += '<td><span style="color:#ccc">—</span></td><td><span style="color:#ccc">—</span></td>';
    }
    html += '</tr>';

    /* subtotal after standard index 5 (પાંયમું) */
    if (i === 5) {
      const sub1 = sumStandards(STANDARDS.slice(0, 6));
      html += '<tr class="subtotal-row"><td class="row-name">બાલવાટિકા + (૧ થી ૫)</td><td></td>' + dataRowCells(sub1) + '<td></td><td></td></tr>';
    }
  });

  /* subtotal for std 6-8 */
  const sub2 = sumStandards(STANDARDS.slice(6, 9));
  html += '<tr class="subtotal-row"><td class="row-name">૬. થી ૮</td><td></td>' + dataRowCells(sub2) + '<td></td><td></td></tr>';

  /* grand total */
  const grand = sumStandards(STANDARDS);
  html += '<tr class="grand-total-row"><td class="row-name">કુલ એકંદરે</td><td></td>' + dataRowCells(grand) + '<td></td><td></td></tr>';

  html += '</tbody></table></div></div></div>';

  if (filledCount === 0) {
    html += '<div class="empty-state">હજુ સુધી કોઈ શિક્ષકે ડેટા સેવ કર્યો નથી.</div>';
  }

  area.innerHTML = html;
}

function summaryCard(label, value) {
  return '<div class="summary-card"><div class="label">' + label + '</div><div class="value">' + value + '</div></div>';
}

/* ---------------- TEACHER VIEW ---------------- */
let teacherEditMode = false;

function renderTeacher() {
  const area = document.getElementById('content-area');
  const std = currentUser.standard;
  const existing = records[std];
  const isLocked = existing ? existing.locked : false;
  const showForm = !existing || teacherEditMode;
  const formDisabled = isLocked;

  let html = '';

  if (showForm) {
    html += '<div class="panel">';
    html += '<div class="panel-header">' + std + ' — વિધાર્થી સંખ્યાનું વર્ગીકરણ દાખલ કરો</div>';
    html += '<div class="panel-body" style="padding:16px;">';
    html += '<div class="entry-grid">';

    FIELD_DEFS.forEach((f) => {
      const val = existing ? (existing.fields[f.key] || 0) : 0;
      html += '<div class="entry-field">';
      html += '<label for="field-' + f.key + '">' + f.label + '</label>';
      html += '<input type="number" min="0" id="field-' + f.key + '" value="' + val + '" ' + (formDisabled ? 'disabled' : '') + ' />';
      html += '</div>';
    });

    html += '</div>';

    html += '<div class="form-actions">';
    html += '<button class="btn-primary" id="save-btn" onclick="saveTeacherRecord()" ' + (formDisabled ? 'disabled' : '') + '>રેકોર્ડ સેવ કરો</button>';
    if (teacherEditMode) {
      html += '<button class="btn-secondary" onclick="cancelTeacherEdit()">રદ કરો</button>';
    }
    html += '</div>';

    if (isLocked) {
      html += '<div class="locked-note" style="display:block;">આ રેકોર્ડ લોક છે અને કાયમ માટે એડિટ થઈ શકશે નહીં.</div>';
    }

    html += '</div></div>';
  }

  if (existing) {
    html += '<div class="panel"><div class="panel-header">સેવ થયેલ રેકોર્ડ</div>';
    html += '<div class="panel-body"><div class="scroll-x"><table class="data-table">';
    html += tableHeadHtml();
    html += '<tbody><tr>';
    html += '<td class="row-name">' + std + '</td>';
    html += '<td>' + escapeHtml(existing.teacherName) + '</td>';
    html += dataRowCells(existing.fields);
    html += '<td>' + (existing.locked ? '<span class="badge locked">Locked</span>' : '<span class="badge open">Open</span>') + '</td>';
    html += '<td>';
    html += '<button class="action-btn edit" onclick="startTeacherEdit()" ' + (existing.locked ? 'disabled' : '') + '>Edit</button>';
    html += existing.locked
      ? '<button class="action-btn lock" disabled style="opacity:0.5; cursor:not-allowed;">Locked</button>'
      : '<button class="action-btn lock" onclick="teacherLockRecord()">Lock</button>';
    html += '</td>';
    html += '</tr></tbody></table></div></div></div>';
  }

  area.innerHTML = html;
}

function saveTeacherRecord() {
  const std = currentUser.standard;
  const fields = {};
  FIELD_DEFS.forEach(f => {
    const el = document.getElementById('field-' + f.key);
    fields[f.key] = parseInt(el.value) || 0;
  });
  records[std] = {
    fields,
    teacherName: currentUser.name,
    locked: false,
    updatedAt: new Date().toISOString()
  };
  teacherEditMode = false;
  renderTeacher();
}

function startTeacherEdit() {
  const std = currentUser.standard;
  if (records[std] && records[std].locked) return;
  teacherEditMode = true;
  renderTeacher();
}

function cancelTeacherEdit() {
  teacherEditMode = false;
  renderTeacher();
}

function teacherLockRecord() {
  const std = currentUser.standard;
  if (records[std]) {
    records[std].locked = true;
    teacherEditMode = false;
    renderTeacher();
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
